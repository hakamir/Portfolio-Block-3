name: CD
run-name: Build, publish & deploy
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  publish-images:
    name: Publish Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Retrieve code
        uses: actions/checkout@v6

      - name: Connect to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/backend:latest

      - name: Build & push image frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/frontend:latest
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Retrieve code
        uses: actions/checkout@v6

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.V_HOST }}
          username: ${{ secrets.V_USER }}
          key: ${{ secrets.V_KEY }}
          port: ${{ secrets.V_PORT }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: "/var/www/app"

      - name: Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.V_HOST }}
          username: ${{ secrets.V_USER }}
          key: ${{ secrets.V_KEY }}
          port: ${{ secrets.V_PORT }}
          script: |
            cd /var/www/app
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -af