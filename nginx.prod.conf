server {
    listen 80;
    server_name deviance.studio www.deviance.studio;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name deviance.studio www.deviance.studio;

    ssl_certificate     /etc/letsencrypt/live/deviance.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deviance.studio/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 200M;

    location ^~ /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
