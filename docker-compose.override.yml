# Dev overrides - automatically loaded with: docker compose up
# NEVER USE IN PRODUCTION
services:
  mongodb:
    ports:
      - "27018:27017"

  backend:
    environment:
      FLASK_ENV: development
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    command: flask run --host=0.0.0.0 --debug

  frontend:
    volumes:
      - ./src:/app/src
